name: CI/CD Pipeline for Docker Hub

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        # GitHub Repository Secrets에 DOCKER_USERNAME과 DOCKER_TOKEN이 등록되어 있어야 합니다.
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }} # Docker Hub의 Access Token을 권장합니다.

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          # 태그를 username/이미지명:latest 형식으로 생성합니다.
          tags: ${{ secrets.DOCKER_USERNAME }}/audio-mlops-api:latest

  deploy:
    needs: build-and-push
    runs-on: self-hosted
    steps:
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Docker Pull Latest Image
        run: docker pull ${{ secrets.DOCKER_USERNAME }}/audio-mlops-api:latest

      - name: Remove Existing Container
        run: docker rm -f audio-mlops-api
        continue-on-error: true

      - name: Run New Container
        run: docker run -d --name audio-mlops-api -p 8000:8000 --restart unless-stopped ${{ secrets.DOCKER_USERNAME }}/audio-mlops-api:latest
