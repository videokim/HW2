name: CI/CD Pipeline for Docker Hub

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        # GitHub Repository Secrets에 DOCKERHUB_USERNAME과 DOCKERHUB_TOKEN이 등록되어 있어야 합니다.
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }} # Docker Hub의 Access Token을 권장합니다.

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          # 태그를 username/이미지명:latest 형식으로 생성합니다.
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/audio-mlops-api:latest
